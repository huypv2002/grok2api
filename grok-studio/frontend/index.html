<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000'/><text x='50' y='68' text-anchor='middle' font-size='55' font-family='sans-serif' font-weight='bold' fill='%23fff'>GS</text></svg>" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <!-- Three.js Galaxy Background -->
  <canvas id="galaxy-bg"></canvas>

  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container glass-panel">
        <div class="auth-logo">
          <div class="logo-icon">✦</div>
          <h1>Grok Studio</h1>
          <p class="subtitle">Nền tảng sáng tạo AI</p>
        </div>
        <div id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="Email" autocomplete="email">
          <input type="password" id="login-password" placeholder="Mật khẩu" autocomplete="current-password">
          <button class="btn-primary" onclick="doLogin()">Đăng Nhập</button>
          <p class="auth-switch">Chưa có tài khoản? <a href="#" onclick="toggleAuth(true)">Đăng Ký</a></p>
        </div>
        <div id="register-form" class="auth-form hidden">
          <input type="text" id="reg-name" placeholder="Tên hiển thị">
          <input type="email" id="reg-email" placeholder="Email" autocomplete="email">
          <input type="password" id="reg-password" placeholder="Mật khẩu" autocomplete="new-password">
          <button class="btn-primary" onclick="doRegister()">Tạo Tài Khoản</button>
          <p class="auth-switch">Đã có tài khoản? <a href="#" onclick="toggleAuth(false)">Đăng Nhập</a></p>
        </div>
        <div id="auth-error" class="error-msg"></div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen">
      <div id="mobile-overlay" class="mobile-overlay" onclick="closeMobileMenu()"></div>
      <nav id="sidebar" class="glass-sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Thu gọn/Mở rộng">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
        </button>
        <div class="sidebar-logo"><span class="logo-icon-sm">✦</span> <span class="sidebar-logo-text">Grok Studio</span></div>
        <div class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Tạo nội dung</div>
          <button class="nav-btn active" data-p="text2video" data-tip="Văn Bản → Video" onclick="go('text2video')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10,8 16,12 10,16"/></svg> Văn Bản → Video</button>
          <button class="nav-btn" data-p="image2video" data-tip="Ảnh → Video" onclick="go('image2video')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> Ảnh → Video</button>
          <button class="nav-btn" data-p="text2image" data-tip="Văn Bản → Ảnh" onclick="go('text2image')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Văn Bản → Ảnh</button>
          <button class="nav-btn" data-p="image2image" data-tip="Ảnh → Ảnh" onclick="go('image2image')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Ảnh → Ảnh</button>
          <button class="nav-btn" data-p="video_project" data-tip="Video Project" onclick="go('video_project')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20"/><path d="M12 2v20"/><path d="M17 2v20"/></svg> Video Project</button>
          <button class="nav-btn" data-p="history" data-tip="Lịch sử" onclick="go('history')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg> Lịch Sử</button>
          <button class="nav-btn" data-p="accounts" data-tip="Cài đặt Token" onclick="go('accounts')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg> Cài Đặt Token</button>
          <button class="nav-btn" data-p="pricing" data-tip="Mua gói" onclick="go('pricing')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Mua Gói</button>
          <button class="nav-btn" data-p="guide" data-tip="Hướng dẫn" onclick="go('guide')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg> Hướng Dẫn</button>
          <button class="nav-btn" data-p="profile" data-tip="Tài khoản" onclick="go('profile')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Tài Khoản</button>
        </div>
        <div id="affiliate-section" class="nav-section">
          <div class="nav-label">CTV</div>
          <button class="nav-btn" data-p="my-affiliate" data-tip="Cộng tác viên" onclick="go('my-affiliate')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 8l-4 4 4 4"/></svg> Cộng Tác Viên</button>
        </div>
        <div id="admin-section" class="nav-section hidden">
          <div class="nav-label">Quản trị</div>
          <button class="nav-btn" data-p="admin-dash" data-tip="Tổng quan" onclick="go('admin-dash')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Tổng Quan</button>
          <button class="nav-btn" data-p="admin-users" data-tip="Người dùng" onclick="go('admin-users')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> Người Dùng</button>
          <button class="nav-btn" data-p="admin-tokens" data-tip="Tất cả Token" onclick="go('admin-tokens')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg> Tất Cả Token</button>
          <button class="nav-btn" data-p="admin-hist" data-tip="Tất cả lịch sử" onclick="go('admin-hist')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Tất Cả Lịch Sử</button>
          <button class="nav-btn" data-p="admin-plans" data-tip="Gói dịch vụ" onclick="go('admin-plans')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Gói Dịch Vụ</button>
          <button class="nav-btn" data-p="admin-pay" data-tip="Giao dịch" onclick="go('admin-pay')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Giao dịch</button>
          <button class="nav-btn" data-p="admin-ctv" data-tip="CTV / Affiliate" onclick="go('admin-ctv')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> CTV / Affiliate</button>
          <button class="nav-btn" data-p="admin-comms" data-tip="Hoa hồng" onclick="go('admin-comms')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Hoa hồng</button>
          <button class="nav-btn" data-p="admin-redemptions" data-tip="Đổi thưởng" onclick="go('admin-redemptions')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12V8H6a2 2 0 010-4h12V0"/><path d="M4 12v4h14a2 2 0 010 4H6v4"/></svg> Đổi thưởng</button>
        </div>
        <div id="superadmin-section" class="nav-section hidden">
          <div class="nav-label">Quản Trị Cao Cấp</div>
          <button class="nav-btn" data-p="admin-bank" data-tip="Ngân hàng" onclick="go('admin-bank')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M12 3l9 7H3z"/><line x1="5" y1="10" x2="5" y2="21"/><line x1="9" y1="10" x2="9" y2="21"/><line x1="15" y1="10" x2="15" y2="21"/><line x1="19" y1="10" x2="19" y2="21"/></svg> Ngân hàng</button>
        </div>
        </div><!-- end sidebar-nav -->
        <div class="sidebar-bottom">
          <div class="user-bar" onclick="go('profile')" style="cursor:pointer" title="Tài khoản">
            <div class="avatar" id="avatar">U</div>
            <div class="uinfo"><div id="uname">User</div><div id="uplan" class="badge">free</div></div>
            <button class="btn-icon" onclick="event.stopPropagation();doLogout()" title="Đăng xuất">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </div>
      </nav>
      <div class="mobile-header" id="mobile-header">
        <button class="mobile-menu-btn" onclick="openMobileMenu()">☰</button>
        <div class="mobile-logo"><span class="mobile-logo-icon">✦</span> Grok Studio</div>
        <div class="mobile-user"><div class="avatar" id="avatar-m">U</div></div>
      </div>
      <main id="content"></main>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/js/bundle.js"></script>
</body>
</html>
